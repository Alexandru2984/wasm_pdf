name: wasm-pdf-editor

services:
  postgres:
    image: postgres:18.4-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pdf_editor}
      POSTGRES_USER: ${POSTGRES_USER:-pdf_editor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - app
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      RUST_LOG: ${RUST_LOG:-backend=info}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-pdf_editor}
      DATABASE_USER: ${POSTGRES_USER:-pdf_editor}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS:-10}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      JWT_SECRET: ${JWT_SECRET:-development-only-change-this-32-byte-secret}
      JWT_ISSUER: ${JWT_ISSUER:-wasm-pdf-editor}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-wasm-pdf-editor-web}
      ACCESS_TOKEN_SECONDS: ${ACCESS_TOKEN_SECONDS:-900}
      SESSION_DAYS: ${SESSION_DAYS:-30}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-localhost}
      WEBAUTHN_RP_ORIGIN: ${WEBAUTHN_RP_ORIGIN:-http://localhost:8080}
      WEBAUTHN_RP_NAME: ${WEBAUTHN_RP_NAME:-PDF Editor}
      EMAIL_DELIVERY_ENABLED: ${EMAIL_DELIVERY_ENABLED:-true}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      EMAIL_TOKEN_SECRET: ${EMAIL_TOKEN_SECRET:-development-only-email-token-secret-32-bytes}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_TLS: ${SMTP_TLS:-none}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-no-reply@localhost}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-PDF Editor}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app
      - observability
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777

  mailpit:
    image: axllent/mailpit:v1.30.4@sha256:5a49a77c5bdbe7c5474450b4f46348d09949df3695257729c93a30369382d4f6
    environment:
      MP_DATABASE: /data/mailpit.db
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: "false"
      MP_SMTP_AUTH_ALLOW_INSECURE: "false"
    ports:
      - "127.0.0.1:${MAILPIT_PORT:-8025}:8025"
    volumes:
      - mailpit-data:/data
    restart: unless-stopped
    networks:
      - app
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8080}:8080"
    restart: unless-stopped
    networks:
      - app
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777

  prometheus:
    image: prom/prometheus:v3.13.0@sha256:c6b27ea434f8389bfe233fbc7be381cf50587c286e871bc842008f5a1b1908a7
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    networks:
      - observability
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL

  loki:
    image: grafana/loki:3.7.3@sha256:70b9f699fc9bb868b62f1cfd4f787dfa50242f1fd92e6089787d5d7daea75fe8
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    restart: unless-stopped
    networks:
      - observability
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL

  docker-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    environment:
      CONTAINERS: "1"
      NETWORKS: "1"
      PING: "1"
      VERSION: "1"
      POST: "0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - observability
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=8m,mode=1777
      - /run:size=8m,mode=0755
    cap_drop:
      - ALL

  alloy:
    image: grafana/alloy:v1.17.1@sha256:4f6ddc56ffdcf8a6316748fc5162972e20cb301523cac1bb4a31957df733ae9b
    command:
      - run
      - --disable-reporting
      - --server.http.enable-pprof=false
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    user: "473:473"
    depends_on:
      - loki
      - docker-proxy
    volumes:
      - ./infra/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy/data
    restart: unless-stopped
    networks:
      - observability
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    cap_drop:
      - ALL

  grafana:
    image: grafana/grafana:13.1.0@sha256:121a7a9ece6dc10b969f1f96eed64b4f07dfac0d0b8abc070f7cb83bbde86f63
    depends_on:
      - prometheus
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: http://localhost:${GRAFANA_PORT:-3000}
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_NEWS_NEWS_FEED_ENABLED: "false"
      GF_PLUGINS_PREINSTALL: ""
      GF_PLUGINS_PREINSTALL_DISABLED: "true"
      GF_PLUGINS_PLUGIN_ADMIN_ENABLED: "false"
      GF_PLUGINS_PUBLIC_KEY_RETRIEVAL_DISABLED: "true"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./infra/grafana/provisioning/datasources/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./infra/grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - management
      - observability
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    cap_drop:
      - ALL

networks:
  app:
    internal: false
  management:
    internal: false
  observability:
    internal: true

volumes:
  grafana-data:
  loki-data:
  prometheus-data:
  alloy-data:
  postgres-data:
  mailpit-data:
