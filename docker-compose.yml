name: wasm-pdf-editor

services:
  postgres:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pdf_editor}
      POSTGRES_USER: ${POSTGRES_USER:-pdf_editor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - app
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      RUST_LOG: ${RUST_LOG:-backend=info}
      DATABASE_URL: postgres://${POSTGRES_USER:-pdf_editor}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-pdf_editor}
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS:-10}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      JWT_SECRET: ${JWT_SECRET:-development-only-change-this-32-byte-secret}
      JWT_ISSUER: ${JWT_ISSUER:-wasm-pdf-editor}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-wasm-pdf-editor-web}
      ACCESS_TOKEN_SECONDS: ${ACCESS_TOKEN_SECONDS:-900}
      SESSION_DAYS: ${SESSION_DAYS:-30}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-localhost}
      WEBAUTHN_RP_ORIGIN: ${WEBAUTHN_RP_ORIGIN:-http://localhost:8080}
      WEBAUTHN_RP_NAME: ${WEBAUTHN_RP_NAME:-PDF Editor}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app
      - observability
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8080}:8080"
    restart: unless-stopped
    networks:
      - app
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777

  prometheus:
    image: prom/prometheus:v3.5.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    networks:
      - observability
    security_opt:
      - no-new-privileges:true

  loki:
    image: grafana/loki:3.5.1
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    restart: unless-stopped
    networks:
      - observability
    security_opt:
      - no-new-privileges:true

  promtail:
    image: grafana/promtail:3.5.1
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-data:/var/lib/promtail
    restart: unless-stopped
    networks:
      - observability
    security_opt:
      - no-new-privileges:true

  grafana:
    image: grafana/grafana:12.1.0
    depends_on:
      - prometheus
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: http://localhost:${GRAFANA_PORT:-3000}
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_NEWS_NEWS_FEED_ENABLED: "false"
      GF_PLUGINS_PREINSTALL: ""
      GF_PLUGINS_PREINSTALL_DISABLED: "true"
      GF_PLUGINS_PLUGIN_ADMIN_ENABLED: "false"
      GF_PLUGINS_PUBLIC_KEY_RETRIEVAL_DISABLED: "true"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./infra/grafana/provisioning/datasources/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./infra/grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - app
      - observability
    security_opt:
      - no-new-privileges:true

networks:
  app:
    internal: false
  observability:
    internal: true

volumes:
  grafana-data:
  loki-data:
  prometheus-data:
  promtail-data:
  postgres-data:
