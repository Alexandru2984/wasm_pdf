name: Deploy

on:
  workflow_run:
    workflows: [Test]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ matrix.image }} image
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [backend, frontend]
    steps:
      - name: Resolve revision
        id: revision
        env:
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          DISPATCH_SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          revision="${WORKFLOW_RUN_SHA:-$DISPATCH_SHA}"
          echo "sha=$revision" >> "$GITHUB_OUTPUT"
          echo "repository=${REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Check out tested revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ steps.revision.outputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ghcr.io/${{ steps.revision.outputs.repository }}-${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=long,prefix=sha-
          labels: |
            org.opencontainers.image.revision=${{ steps.revision.outputs.sha }}

      - name: Build and publish image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: docker/${{ matrix.image }}/Dockerfile
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: mode=max
          sbom: true

  rollout:
    name: Trigger production rollout
    needs: publish
    runs-on: ubuntu-latest
    env:
      DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
    steps:
      - name: Notify deployment platform
        env:
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          DISPATCH_SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "DEPLOY_WEBHOOK_URL is not configured; images were published only."
            exit 0
          fi

          revision="${WORKFLOW_RUN_SHA:-$DISPATCH_SHA}"
          # REPOSITORY is injected through the step environment by GitHub Actions.
          # shellcheck disable=SC2153
          repository="${REPOSITORY,,}"
          jq -n \
            --arg revision "$revision" \
            --arg backend "ghcr.io/${repository}-backend:sha-${revision}" \
            --arg frontend "ghcr.io/${repository}-frontend:sha-${revision}" \
            '{revision: $revision, images: {backend: $backend, frontend: $frontend}}' \
            | curl --fail-with-body --silent --show-error \
                --header "Content-Type: application/json" \
                --data-binary @- \
                "$DEPLOY_WEBHOOK_URL"
