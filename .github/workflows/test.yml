name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust and WASM
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0
          targets: wasm32-unknown-unknown
          components: clippy,rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Check PDF worker WASM target
        run: cargo check --package pdf-worker --target wasm32-unknown-unknown --release --locked

      - name: Check frontend WASM target
        run: cargo check --package frontend --target wasm32-unknown-unknown --release --locked

  configuration:
    name: Deployment configuration
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Render Docker Compose configuration
        run: docker compose config --quiet

      - name: Validate Grafana dashboard JSON
        run: jq empty infra/grafana/dashboards/pdf-editor-overview.json

      - name: Validate Loki configuration
        run: >-
          docker run --rm
          --volume "$PWD/infra/loki/loki-config.yml:/etc/loki/config.yml:ro"
          grafana/loki:3.5.1
          -config.file=/etc/loki/config.yml
          -verify-config=true

      - name: Validate Promtail configuration
        run: >-
          docker run --rm
          --volume "$PWD/infra/promtail/promtail-config.yml:/etc/promtail/config.yml:ro"
          grafana/promtail:3.5.1
          -config.file=/etc/promtail/config.yml
          -check-syntax

  container-images:
    name: Build ${{ matrix.image }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [backend, frontend]
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Build image
        run: >-
          docker build
          --file docker/${{ matrix.image }}/Dockerfile
          --tag wasm-pdf-${{ matrix.image }}:ci
          .
