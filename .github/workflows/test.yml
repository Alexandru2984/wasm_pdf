name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Supply-chain security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Check advisories, licenses, bans, and sources
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          command: check
          arguments: --all-features --locked

      - name: Audit Rust dependencies
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan Git history for secrets
        run: >-
          docker run --rm
          --volume "$PWD:/repo:ro"
          zricethezav/gitleaks@sha256:090a2715530bd6592342e6a66c3f35eafcaaf2a3227a312482504f9c854997e3
          detect --source=/repo --no-banner --redact --exit-code=1

  rust:
    name: Rust and WASM
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0
          targets: wasm32-unknown-unknown
          components: clippy,rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Check PDF worker WASM target
        run: cargo check --package pdf-worker --target wasm32-unknown-unknown --release --locked

      - name: Check frontend WASM target
        run: cargo check --package frontend --target wasm32-unknown-unknown --release --locked

  configuration:
    name: Deployment configuration
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Render Docker Compose configuration
        run: docker compose config --quiet

      - name: Render production Docker Compose configuration
        env:
          BACKEND_IMAGE: ghcr.io/example/wasm-pdf-backend:sha-test
          FRONTEND_IMAGE: ghcr.io/example/wasm-pdf-frontend:sha-test
          PUBLIC_DOMAIN: pdf.example.invalid
          SMTP_HOST: smtp.example.invalid
          SMTP_USERNAME: ci-account
          SMTP_FROM_ADDRESS: no-reply@example.invalid
        run: docker compose -f docker-compose.yml -f compose.production.yml config --quiet

      - name: Validate GitHub Actions workflows
        run: >-
          docker run --rm
          --volume "$PWD:/repo:ro"
          --workdir /repo
          rhysd/actionlint@sha256:887a259a5a534f3c4f36cb02dca341673c6089431057242cdc931e9f133147e9

      - name: Check operational shell scripts
        run: >-
          docker run --rm
          --volume "$PWD:/repo:ro"
          koalaman/shellcheck@sha256:bb596a0d169b85ddd81d8b6d3a2ff6d5baf5fca10b97f575ebc647c3dff62b3d
          /repo/scripts/backup-postgres.sh
          /repo/scripts/verify-postgres-backup.sh
          /repo/scripts/restore-postgres.sh

      - name: Validate Grafana dashboard JSON
        run: jq empty infra/grafana/dashboards/pdf-editor-overview.json

      - name: Validate Loki configuration
        run: >-
          docker run --rm
          --volume "$PWD/infra/loki/loki-config.yml:/etc/loki/config.yml:ro"
          grafana/loki@sha256:70b9f699fc9bb868b62f1cfd4f787dfa50242f1fd92e6089787d5d7daea75fe8
          -config.file=/etc/loki/config.yml
          -verify-config=true

      - name: Validate Prometheus configuration
        run: >-
          docker run --rm
          --entrypoint /bin/promtool
          --volume "$PWD/infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"
          prom/prometheus@sha256:c6b27ea434f8389bfe233fbc7be381cf50587c286e871bc842008f5a1b1908a7
          check config /etc/prometheus/prometheus.yml

      - name: Validate Alloy configuration
        run: >-
          docker run --rm
          --volume "$PWD/infra/alloy/config.alloy:/etc/alloy/config.alloy:ro"
          grafana/alloy:v1.17.1@sha256:4f6ddc56ffdcf8a6316748fc5162972e20cb301523cac1bb4a31957df733ae9b
          validate /etc/alloy/config.alloy

  container-images:
    name: Build ${{ matrix.image }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [backend, frontend]
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Build image
        run: >-
          docker build
          --file docker/${{ matrix.image }}/Dockerfile
          --tag wasm-pdf-${{ matrix.image }}:ci
          .

      - name: Scan image for high and critical vulnerabilities
        run: >-
          docker run --rm
          --volume /var/run/docker.sock:/var/run/docker.sock
          --volume "$RUNNER_TEMP/trivy-cache:/root/.cache"
          aquasec/trivy@sha256:cffe3f5161a47a6823fbd23d985795b3ed72a4c806da4c4df16266c02accdd6f
          image --skip-version-check --scanners vuln
          --severity HIGH,CRITICAL --exit-code 1
          wasm-pdf-${{ matrix.image }}:ci

  backup-recovery:
    name: Encrypted backup restore drill
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-postgres-password
      BACKUP_DIR: /tmp/wasm-pdf-encrypted-backups
      BACKUP_AGE_RECIPIENT_FILE: /tmp/wasm-pdf-backup-recipient.txt
      BACKUP_AGE_IDENTITY_FILE: /tmp/wasm-pdf-backup-identity.age
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install verified age binary
        env:
          AGE_ARCHIVE_SHA256: bdc69c09cbdd6cf8b1f333d372a1f58247b3a33146406333e30c0f26e8f51377
          AGE_VERSION: 1.3.1
        run: |
          archive="$RUNNER_TEMP/age.tar.gz"
          curl --fail --location --silent --show-error \
            --output "$archive" \
            "https://github.com/FiloSottile/age/releases/download/v${AGE_VERSION}/age-v${AGE_VERSION}-linux-amd64.tar.gz"
          echo "$AGE_ARCHIVE_SHA256  $archive" | sha256sum --check --strict
          tar --extract --gzip --file "$archive" --directory "$RUNNER_TEMP"
          sudo install -m 0755 "$RUNNER_TEMP/age/age" "$RUNNER_TEMP/age/age-keygen" /usr/local/bin/

      - name: Start PostgreSQL and create recovery fixture
        run: |
          docker compose up -d --wait postgres
          docker compose exec -T postgres \
            psql --username pdf_editor --dbname pdf_editor --set ON_ERROR_STOP=1 \
            --command 'CREATE TABLE _sqlx_migrations (version bigint PRIMARY KEY, success boolean NOT NULL);' \
            --command 'INSERT INTO _sqlx_migrations (version, success) VALUES (1, true);' \
            --command 'CREATE TABLE recovery_fixture (value text NOT NULL);' \
            --command "INSERT INTO recovery_fixture (value) VALUES ('restore-me');"

      - name: Create keys and encrypted backup
        run: |
          age-keygen --output "$BACKUP_AGE_IDENTITY_FILE"
          age-keygen -y "$BACKUP_AGE_IDENTITY_FILE" >"$BACKUP_AGE_RECIPIENT_FILE"
          scripts/backup-postgres.sh

      - name: Restore and validate encrypted backup
        run: |
          backup=$(find "$BACKUP_DIR" -maxdepth 1 -name 'postgres-*.dump.age' -print -quit)
          test -n "$backup"
          scripts/verify-postgres-backup.sh "$backup"

      - name: Stop recovery fixture
        if: always()
        run: docker compose down --volumes --remove-orphans
