global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    application: wasm-pdf-editor
    environment: production

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: pdf-editor-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8080"]
        labels:
          service: backend

