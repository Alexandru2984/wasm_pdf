services:
  postgres:
    environment:
      POSTGRES_PASSWORD: !reset null
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID

  migrate:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE to an immutable sha tag or digest}
    command: ["migrate"]
    environment: &backend-production-environment
      APP_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      RUST_LOG: ${RUST_LOG:-backend=info}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-pdf_editor}
      DATABASE_USER: ${POSTGRES_USER:-pdf_editor}
      DATABASE_PASSWORD_FILE: /run/secrets/postgres_password
      DATABASE_MAX_CONNECTIONS: 2
      RUN_MIGRATIONS: "true"
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      JWT_ISSUER: ${JWT_ISSUER:-wasm-pdf-editor}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-wasm-pdf-editor-web}
      ACCESS_TOKEN_SECONDS: ${ACCESS_TOKEN_SECONDS:-900}
      SESSION_DAYS: ${SESSION_DAYS:-30}
      COOKIE_SECURE: "true"
      WEBAUTHN_RP_ID: ${PUBLIC_DOMAIN:?Set PUBLIC_DOMAIN to the application DNS name}
      WEBAUTHN_RP_ORIGIN: https://${PUBLIC_DOMAIN:?Set PUBLIC_DOMAIN to the application DNS name}
      WEBAUTHN_RP_NAME: ${WEBAUTHN_RP_NAME:-PDF Editor}
    depends_on:
      postgres:
        condition: service_healthy
    secrets:
      - postgres_password
      - jwt_secret
    networks:
      - app
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: "no"

  backend:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE to an immutable sha tag or digest}
    build: !reset null
    environment:
      <<: *backend-production-environment
      DATABASE_PASSWORD: !reset null
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS:-10}
      JWT_SECRET: !reset null
      RUN_MIGRATIONS: "false"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    secrets:
      - postgres_password
      - jwt_secret
    cap_drop:
      - ALL

  frontend:
    image: ${FRONTEND_IMAGE:?Set FRONTEND_IMAGE to an immutable sha tag or digest}
    build: !reset null
    ports: !reset []
    cap_drop:
      - ALL

  grafana:
    environment:
      GF_SECURITY_ADMIN_PASSWORD: !reset null
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_SERVER_ROOT_URL: http://127.0.0.1:${GRAFANA_PORT:-3000}
    ports: !override
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    secrets:
      - grafana_admin_password

  caddy:
    image: caddy:2.11.3-alpine
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:?Set PUBLIC_DOMAIN to the application DNS name}
    depends_on:
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - app
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

secrets:
  postgres_password:
    file: ${SECRETS_DIR:-/etc/wasm-pdf-editor/secrets}/postgres_password
  jwt_secret:
    file: ${SECRETS_DIR:-/etc/wasm-pdf-editor/secrets}/jwt_secret
  grafana_admin_password:
    file: ${SECRETS_DIR:-/etc/wasm-pdf-editor/secrets}/grafana_admin_password

volumes:
  caddy-data:
  caddy-config:
